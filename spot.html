    <title>ツーリング・ドライブの目的地をランダム提案｜おすすめスポット3件【どこいこMap】</title>
    <meta name="description"
        content="出発地と移動時間から、ツーリングやドライブの目的地におすすめのスポットをランダムで3件提案。行き先が決まらないときの目的地探しに使える、どこいこMapのスポット版です。">

    <meta name="robots" content="index, follow">
    <meta name="format-detection" content="telephone=no">

    <meta property="og:title" content="ツーリング・ドライブの目的地をランダム提案｜どこいこMap スポット版">
    <meta property="og:description" content="出発地と移動時間から、ツーリングやドライブにおすすめのスポットをランダムで3件提案。行き先が決まらないときの目的地探しに使えます。">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="ツーリング・ドライブの目的地をランダム提案｜どこいこMap スポット版">
    <meta name="twitter:description" content="出発地と移動時間から、おすすめスポットをランダムで3件提案。行き先が決まらないときの目的地探しに。">

    <link rel="canonical" href="https://www.dokoiko-map.com/spot.html">
    <link rel="stylesheet" href="css/ChoiceYourRoad.css">
    <link rel="icon" href="image/dog.png" type="image/png">
</head>

<body>
    <div class="app">

        <header class="header">
            <a href="index.html">
                <img src="image/dog.png" alt="どこいこMapロゴ" class="site-icon">
            </a>

            <h1 class="TitleName">
                どこいこMap
                <span class="subTitle">スポット版<br>目的地をランダム提案</span>
            </h1>

            <p class="page-lead">
                ツーリングやドライブの行き先に迷ったら、出発地と移動時間からおすすめスポットをランダムで3件提案します。
            </p>
        </header>

        <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く" aria-expanded="false"
            aria-controls="mobileMenu">
            ☰
        </button>

        <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>

        <nav class="mobile-menu" id="mobileMenu" aria-hidden="true">
            <button class="mobile-menu-close" id="mobileMenuClose" aria-label="メニューを閉じる">✕</button>

            <a href="index.html">TOP</a>
            <a href="spot.html">スポット</a>
            <a href="area.html">地名</a>

            <div class="mobile-submenu-wrap">
                <button class="mobile-submenu-toggle" id="themeSubmenuToggle" aria-expanded="false"
                    aria-controls="themeSubmenu">
                    テーマ
                </button>

                <div class="mobile-submenu" id="themeSubmenu">
                    <a href="theme.html">テーマ一覧</a>
                    <a href="themes/gourmet.html">グルメ</a>
                    <a href="themes/tourism.html">観光</a>
                    <a href="themes/nature.html">自然</a>
                    <a href="themes/goodRoad.html">気持ちよく走れる道</a>
                </div>
            </div>

            <a href="about.html">このサイトについて</a>
            <a href="contact.html">お問い合わせ</a>
        </nav>

        <nav class="page-nav">
            <button onclick="location.href='index.html'">TOP</button>
            <button class="active">スポット</button>
            <button onclick="location.href='area.html'">地名</button>
            <button onclick="location.href='theme.html'">テーマ</button>
        </nav>

        <section class="panel-top">

            <label for="startLocation">出発地の住所：</label><br>
            <input id="startLocation" type="text" placeholder="例：東京都渋谷区">
            <br>

            <button onclick="getCurrentLocation()" class="location-btn">
                📍 現在地を使用
            </button>

            <p class="notice">
                ※現在地は保存されません
            </p>

            <label for="timeSelect">移動時間：</label>
            <select id="timeSelect">
                <option value="30">30分</option>
                <option value="60">1時間</option>
                <option value="90">1時間30分</option>
                <option value="120">2時間</option>
                <option value="150">2時間30分</option>
                <option value="180">3時間</option>
            </select>

            <br>

            <label for="highway">高速道路/有料道路：</label>
            <select id="highway">
                <option value="yes">使う</option>
                <option value="no">使わない</option>
            </select>

            <br>

            <button onclick="searchSpot()" class="main-button">
                どこいこうかな！
            </button>

            <div class="results hidden" id="results">
                <div id="result1" class="result-item"></div>
                <div id="result2" class="result-item"></div>
                <div id="result3" class="result-item"></div>
            </div>

            <button id="rerollButton" onclick="rerollSpot()" class="reroll-btn hidden">
                🎲 もう一回まわす
            </button>

        </section>

        <section class="panel-map">
            <div id="map"></div>
        </section>

        <footer class="footer">
            <p>© どこいこMap</p>
            <a href="about.html">このサイトについて</a> |
            <a href="contact.html">お問い合わせ</a>
        </footer>

        <script src="js/spot.js?v=3"></script>
        <script src="js/menu.js"></script>
        <script
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyADU3rpPRFLqIm4PBKx8M3xl6WYcoCrhVw&libraries=places&callback=initMap"
            async defer>
            </script>

    </div>
</body>

</html>
