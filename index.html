<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>どこいこMap｜ランダムでお出かけスポットを提案する地図アプリ</title>
    <meta name="description" content="現在地からランダムに観光・グルメ・自然スポットを提案！行き先に迷ったらどこいこMap。">
    <meta property="og:title" content="どこいこMap">
    <meta property="og:description" content="ランダムで行き先を決めるお出かけアプリ">
    <meta property="og:image" content="https://dokoiko-map.com/dog.png">

    <link rel="stylesheet" href="css/TopStyle.css">
    <link rel="icon" href="image/dog.png">


</head>


<body>

    <div class="app">

        <header class="header">

            <a href="index.html">
                <img src="image/dog.png" alt="どこいこMapロゴ" class="site-icon">
            </a>

            <h1>どこいこMap</h1>

            <p class="subtitle">
                目的地をランダムにご提案！
            </p>

        </header>

        <main class="menu">

            <div class="card">

                <h2>ランダムスポット</h2>

                <p>
                    スポットをランダムに3か所提案します。<br>
                    次の目的地の候補を見つけてみてください。
                </p>

                <button onclick="location.href='spot.html'">
                    スポットを探す
                </button>

            </div>


            <div class="card">

                <h2>ランダム地名</h2>

                <p>
                    ツーリング・ドライブ先を地名で提案します。<br>
                    GoogleMapを見ながら目的地を決めたい方はこちら。
                </p>

                <button onclick="location.href='area.html'">
                    地名を探す
                </button>

            </div>


            <div class="card">

                <h2>テーマで探す</h2>

                <p>
                    グルメ・観光・絶景など<br>
                    テーマから目的地を探します。
                </p>

                <button onclick="location.href='theme.html'">
                    テーマを選ぶ
                </button>

            </div>

        </main>


        <footer class="footer">

            <p>
                © どこいこMap
            </p>
            <a href="about.html">このサイトについて</a> |
            <a href="contact.html">お問い合わせ</a>
        </footer>

    </div>

</body>

</html>
