        content="ツーリングやドライブの行き先が決まらないときに、地名（エリア）をランダムで提案。出発地と移動時間から目的地候補を探せます。Googleマップでルートを見ながら決めたい方におすすめ。">

    <meta name="twitter:description" content="出発地と移動時間から、目的地候補の地名（エリア）をランダムで提案します。">

    <link rel="canonical" href="https://www.dokoiko-map.com/area.html">

    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/ChoiceYourRoad.css">
    <link rel="icon" href="image/dog.png" type="image/png">
</head>

<body>
    <div class="app">

        <header class="header">
            <a href="index.html">
                <img src="image/dog.png" alt="どこいこMapロゴ" class="site-icon">
            </a>

            <h1 class="TitleName">
                どこいこMap
                <span class="subTitle">地名版<br>エリアから目的地をランダム提案</span>
            </h1>

            <p class="page-lead">
                ツーリングやドライブの行き先が決まらないときに、地名（エリア）から目的地候補をランダムで提案します。<br>
                Googleマップを見ながらルートを決めたい方におすすめです。
            </p>
        </header>

        <div id="commonMenu"></div>

        <p class="site-description">

            地図を見ながら、<br>
            自由に行き先を決めたい方におすすめです。
        </p>

        <section class="panel-top">

            <label for="startLocation">出発地の住所：</label><br>
            <input id="startLocation" type="text" placeholder="例：東京都渋谷区">
            <br>

            <button onclick="getCurrentLocation()" class="location-btn">
                📍 現在地を使用
            </button>

            <p class="notice">
                ※現在地は保存されません
            </p>

            <label for="timeSelect">移動時間：</label>
            <select id="timeSelect">
                <option value="30">30分</option>
                <option value="60">1時間</option>
                <option value="90">1時間30分</option>
                <option value="120">2時間</option>
                <option value="150">2時間30分</option>
                <option value="180">3時間</option>
            </select>

            <br>

            <label for="highway">高速道路/有料道路：</label>
            <select id="highway">
                <option value="yes">使う</option>
                <option value="no">使わない</option>
            </select>

            <br>

            <button onclick="searchArea()" class="main-button">
                どこいこうかな！
            </button>

            <div class="results" id="resultsBox">
                <div id="result"></div>
            </div>

        </section>

        <section class="panel-map">
            <div id="map"></div>
        </section>

        <footer class="footer">
            <p>© どこいこMap</p>
            <a href="about.html">このサイトについて</a> |
            <a href="contact.html">お問い合わせ</a>
        </footer>

        <script src="js/area.js"></script>
        <script src="js/menu.js"></script>
        <script
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC46ImAYGQdDnN6gE6k25CCkemuCU5DXJ8&callback=initMap"
            async defer>
            </script>

    </div>
</body>

</html>
