<p class="site-description">
今日はどんな自然を感じたい？<br>
ドライブやツーリングで立ち寄りたくなる景色を楽しめる場所や、自然の中でひと息つけるスポットから、気分に合う候補を提案します。<br>
出発地と移動時間を選んで、次のリフレッシュスポットを見つけてみてください。
</p>

<section class="panel-top">

<label>出発地の住所：</label><br>
<input id="startLocation" type="text" placeholder="例：東京都渋谷区">
<br>

<button onclick="getCurrentLocation()" class="location-btn">
📍 現在地を使用
</button>

<p class="notice">
※現在地は保存されません
</p>

<label>移動時間：</label>
<select id="timeSelect">
<option value="30">30分</option>
<option value="60">1時間</option>
<option value="90">1時間30分</option>
<option value="120">2時間</option>
</select>

<br>

<label>高速道路/有料道路：</label>
<select id="highway">
<option value="yes">使う</option>
<option value="no">使わない</option>

<br>

<button onclick="searchNature()" class="main-button">
