<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>どこいこMap - グルメ</title>

<link rel="stylesheet" href="../css/ChoiceYourRoad.css">
<link rel="stylesheet" href="../css/theme.css">
<link rel="icon" href="../image/green_dog.png">

</head>

<body class="nature-theme">

<div class="app">

<header class="header">

<a href="index.html">
<img src="../image/green_dog.png" alt="どこいこMapロゴ" class="site-icon">
</a>

<h1 class="TitleName">
  どこいこMap
  <span class="subTitle">自然版</span>
</h1>

</header>

<nav class="page-nav">

<button onclick="location.href='../index.html'">
TOP
</button>

<button onclick="location.href='../spot.html'">
スポット
</button>

<button onclick="location.href='../area.html'">
地名
</button>

<button onclick="location.href='../theme.html'" class="active">
テーマ
</button>

</nav>

<p class="site-description">
ドライブ・ツーリング向けの自然を感じるスポットをランダムに3か所提案します。<br>
出先で次どこいこうにもってこいの自然・ライディング特化版です!<br>
出発地と移動時間を選択してください。
</p>

<section class="panel-top">

<label>出発地の住所：</label><br>
<input id="startLocation" type="text" placeholder="例：東京都渋谷区">
<br>

<button onclick="getCurrentLocation()" class="location-btn">
📍 現在地を使用
</button>

<p class="notice">
※現在地は保存されません
</p>

<label>移動時間：</label>
<select id="timeSelect">
<option value="30">30分</option>
<option value="60">1時間</option>
</select>

<br>

<label>高速道路/有料道路：</label>
<select id="highway">
<option value="yes">使う</option>
<option value="no">使わない</option>
</select>

<br>

<button onclick="searchNature()" class="main-button">
どこいこうかな！
</button>

<div class="results" id="results">
<div id="result1" class="result-item"></div>
<div id="result2" class="result-item"></div>
<div id="result3" class="result-item"></div>
</div>

<button id="rerollButton" onclick="rerollNature()" class="reroll-btn hidden">
🎲 もう一回まわす
</button>

</section>

<section class="panel-map">
<div id="map"></div>
</section>

        <footer class="footer">

            <p>
                © どこいこMap
            </p>
            <a href="../about.html">このサイトについて</a> |
            <a href="../contact.html">お問い合わせ</a>
        </footer>

<script src="../js/nature.js"></script>
<script
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyADU3rpPRFLqIm4PBKx8M3xl6WYcoCrhVw&libraries=places&callback=initMap" 
async defer>
</script>

</div>

</body>
</html>
