<!DOCTYPE html>
<html lang="ja">
<head>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8210525296915138"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>履歴｜どこいこMap</title>
  <meta name="description" content="どこいこMapで最近見つけたツーリングスポットの履歴を確認できます。">

  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/ChoiceYourRoad.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="icon" href="image/dog.png">
</head>

<body>
  <div class="app">

    <header class="header">
      <a href="index.html">
        <img src="image/dog.png" alt="どこいこMapロゴ" class="site-icon">
      </a>

      <h1 class="TitleName">
        どこいこMap
        <span class="subTitle">履歴</span>
      </h1>
    </header>

    <div id="commonMenu"></div>

    <main class="history-page">
      <section class="history-hero">
        <h2>わんこが最近見つけたスポット</h2>
        <p>各ページで見つけた行き先を見返せます。</p>
      </section>

      <section id="historyList" class="history-list"></section>

      <div class="history-actions">
        <button id="clearHistoryBtn" class="clear-history-btn">
          全履歴を削除
        </button>

        <button onclick="location.href='spot.html'" class="back-spot-btn">
          スポット版に戻る
        </button>
      </div>
    </main>

  </div>

  <script src="js/history.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
